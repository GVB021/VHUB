[phases.setup]
nixPkgs = ['nodejs']

[phases.install]
cmds = ['npm ci --prefer-offline --no-audit --no-fund']
cacheDirectories = ['node_modules', '.npm']

[phases.build]
cmds = ['npm run build']
cacheDirectories = ['dist', 'voz-&-carreira---portal-de-dublagem/dist']


[variables]
NODE_ENV = 'production'
NODE_VERSION = '20'
PORT = '3000'
NPM_CONFIG_FUND = 'false'
NPM_CONFIG_AUDIT = 'false'
NPM_CONFIG_PREFER_OFFLINE = 'true'
